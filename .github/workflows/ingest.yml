# Daily ingestion pipeline (brief §6/§9).
#
# Runs the TypeScript pipeline that downloads the Assemblée nationale open data
# and writes it to Turso. This is where all the slow/heavy work happens — it
# never runs in a Vercel function.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   TURSO_DATABASE_URL, TURSO_AUTH_TOKEN
#   (ANTHROPIC_API_KEY is added later, for the AI enrichment phase.)
#
# The committed state file (data/last-run.json) doubles as activity to keep the
# scheduled workflow from being disabled after 60 days, and the push it creates
# triggers a fresh Vercel deployment so new scrutins go live.

name: ingest

on:
  schedule:
    # 05:00 UTC every day.
    - cron: "0 5 * * *"
  workflow_dispatch: {}

# Allow the job to push the updated state file back to the repo.
permissions:
  contents: write

# Never run two ingests at once.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Throttle to stay within the Gemini free-tier per-minute limit.
      AI_DELAY_MS: "5000"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Run ingestion
        run: npm run ingest

      # AI enrichment (Gemini free tier). Incremental and resumable: it stops
      # cleanly when the daily/per-minute quota is reached and continues on the
      # next run, so the backfill converges over several days at zero cost.
      - name: Run AI enrichment
        run: npm run enrich

      - name: Commit run state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/last-run.json data/last-enrich.json
          if git diff --staged --quiet; then
            echo "No state change to commit."
            exit 0
          fi
          git commit -m "chore: update ingestion state [skip ci]"
          # Rebase-retry so a concurrent push to main (e.g. an app deploy) does
          # not fail this step — the ingestion itself has already succeeded.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "State pushed."
              exit 0
            fi
            echo "Push rejected; rebasing onto latest main (attempt $attempt)..."
            git pull --rebase --autostash origin main || true
          done
          echo "::warning::Could not push run state after retries (ingestion still succeeded)."
